<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily's Site</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
            background: #fafafa;
            color: #333;
        }
        h1 { font-size: 2.5em; margin-bottom: 0.2em; }
        .subtitle { color: #888; font-size: 1.1em; margin-bottom: 2em; }
        .section { margin-bottom: 2em; }
        .section h2 { border-bottom: 2px solid #eee; padding-bottom: 0.3em; }
        .music-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag {
            background: #f0e6ff;
            color: #6b3fa0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        footer { margin-top: 3em; color: #aaa; font-size: 0.85em; }
    </style>
</head>
<body>
    <h1>Hey, I'm Emily ✨</h1>
    <p class="subtitle">Welcome to my corner of the internet</p>

    <div class="section">
        <h2>About Me</h2>
        <p>This is my website. More coming soon!</p>
    </div>

    <div class="section">
        <h2>Music I Love 🎵</h2>
        <div class="music-tags">
            <span class="tag">Taylor Swift</span>
            <span class="tag">Olivia Rodrigo</span>
            <span class="tag">Ariana Grande</span>
            <span class="tag">Sabrina Carpenter</span>
        </div>
        <p style="margin-top: 1em; color: #888; font-style: italic;">all the pop girlies</p>
    </div>

    <footer>
        Built with 💜 by Emily
    </footer>
</body>
</html>
